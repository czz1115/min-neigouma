<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>内购码领取</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: #f5f5f5;
    padding: 40px 20px;
    text-align: center;
  }
  h2 {
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 24px;
  }
  button {
    padding: 14px 28px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    background: #1677ff;
    color: #fff;
    cursor: pointer;
  }
  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .code {
    margin-top: 24px;
    font-size: 22px;
    font-weight: bold;
    color: #e63946;
    word-break: break-all;
  }
  .info {
    margin-top: 12px;
    font-size: 14px;
    color: #888;
  }
  .remain {
    margin-top: 8px;
    font-size: 15px;
    color: #1677ff;
    font-weight: bold;
  }
  .my-codes {
    margin-top: 24px;
    padding: 16px;
    background: #e8f5e9;
    border-radius: 8px;
    border: 1px solid #a5d6a7;
    text-align: left;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .my-codes h4 {
    margin: 0 0 8px 0;
    font-size: 14px;
    color: #2e7d32;
  }
  .my-codes .code-list {
    font-size: 15px;
    color: #2e7d32;
    font-weight: bold;
    line-height: 1.8;
    word-break: break-all;
  }
  .my-codes .empty {
    font-size: 13px;
    color: #999;
  }

  /* ✅ 新增：复制按钮样式 */
  .copy-btn {
    margin-left: 8px;
    padding: 2px 10px;
    font-size: 12px;
    border-radius: 4px;
    border: 1px solid #a5d6a7;
    background: #fff;
    color: #2e7d32;
    cursor: pointer;
  }
  .copy-btn:active {
    opacity: 0.7;
  }

  .tips {
    margin-top: 40px;
    padding: 16px;
    background: #fff8e6;
    border-radius: 8px;
    border: 1px solid #ffe0b2;
    text-align: left;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .tips h4 {
    margin: 0 0 8px 0;
    font-size: 14px;
    color: #e6a23c;
  }
  .tips p {
    margin: 4px 0;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h2>🎁 内购码领取</h2>
<p class="subtitle">每人最多可领取 <b>1</b> 个内购码，先到先得</p>

<button id="btn">立即领取</button>
<div class="code" id="result"></div>
<div class="info" id="info"></div>
<div class="remain" id="remain"></div>

<!-- 已领取的码展示区 -->
<div class="my-codes" id="myCodesBox">
  <h4>📋 我已领取的内购码</h4>
  <div class="empty" id="codeListEmpty">暂无领取记录</div>
  <div class="code-list" id="codeList"></div>
</div>

<div class="tips">
  <h4>📌 温馨提示</h4>
  <p>1、每个人仅限领取一个内购码</p>
  <p>2、内购码数量有限，先到先得</p>
  <p>3、请妥善保管你的内购码</p>
</div>

<!-- ✅ 引入 config.js -->
<script src="config.js"></script>

<script>
let codePool = window.NEIGOU_CODES || [];
const CURRENT_BATCH = window.NEIGOU_BATCH || '';

const MAX_CLAIM = 1;

const btn = document.getElementById("btn");
const result = document.getElementById("result");
const info = document.getElementById("info");
const remain = document.getElementById("remain");
const codeList = document.getElementById("codeList");
const codeListEmpty = document.getElementById("codeListEmpty");

let claimedCount = Number(localStorage.getItem("claimedCount") || 0);
let claimedCodes = JSON.parse(localStorage.getItem("claimedCodes") || "[]");
let savedBatch = localStorage.getItem("neigou_batch") || '';

/* ✅ 批次变更检测：如果批次变了，清空旧记录 */
if (savedBatch !== CURRENT_BATCH) {
  localStorage.removeItem("claimedCount");
  localStorage.removeItem("claimedCodes");
  localStorage.setItem("neigou_batch", CURRENT_BATCH);
  claimedCount = 0;
  claimedCodes = [];
}

/* 初始化显示 */
info.innerText = "已领取 " + claimedCount + "/" + MAX_CLAIM + " 个";
remain.innerText = "剩余可领取：" + codePool.length + " 个";

/* 展示已领取的码（含复制按钮） */
function renderClaimedCodes() {
  if (claimedCodes.length > 0) {
    codeListEmpty.style.display = "none";
    codeList.style.display = "block";
    codeList.innerHTML = claimedCodes
      .map(
        (code, i) =>
          `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;">
            <span>${code}</span>
            <button class="copy-btn" onclick="copyCode(${i})">复制</button>
          </div>`
      )
      .join("");
  } else {
    codeListEmpty.style.display = "block";
    codeList.style.display = "none";
  }
}
renderClaimedCodes();

/* 如果已领满，禁用按钮 */
if (claimedCount >= MAX_CLAIM) {
  btn.disabled = true;
  result.innerText = "你已领取满 " + MAX_CLAIM + " 个，感谢参与！";
}

btn.onclick = () => {
  if (codePool.length === 0) {
    result.innerText = "❌ 内购码已全部领完";
    btn.disabled = true;
    remain.innerText = "剩余可领取：0 个";
    return;
  }

  if (claimedCount >= MAX_CLAIM) {
    result.innerText = "❌ 每人最多领取 " + MAX_CLAIM + " 个";
    btn.disabled = true;
    return;
  }

  const idx = Math.floor(Math.random() * codePool.length);
  const code = codePool.splice(idx, 1)[0];

  claimedCount++;
  claimedCodes.push(code);

  localStorage.setItem("claimedCount", claimedCount);
  localStorage.setItem("claimedCodes", JSON.stringify(claimedCodes));
  localStorage.setItem("neigou_batch", CURRENT_BATCH);

  result.innerText = code;
  info.innerText = "已领取 " + claimedCount + "/" + MAX_CLAIM + " 个";
  remain.innerText = "剩余可领取：" + codePool.length + " 个";

  renderClaimedCodes();

  if (claimedCount >= MAX_CLAIM) {
    btn.disabled = true;
  }
};

/* ✅ 复制单个码 */
function copyCode(index) {
  const code = claimedCodes[index];
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => {
      alert("✅ 已复制：" + code);
    });
  } else {
    // 兼容旧浏览器
    const textarea = document.createElement("textarea");
    textarea.value = code;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
    alert("✅ 已复制：" + code);
  }
}
</script>

</body>
</html>
